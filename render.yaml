services:
  - type: web
    name: sakinah-quran-lms-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci || npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
